<header class="site-header">
    <div class="header-content">
        <a href="{{ '/' | relative_url }}" class="site-title">
            <h1>{{ site.title }}</h1>
        </a>
        <nav class="top-nav">
            <ul>
                {% for nav in site.navigation %}
                <li><a href="{{ nav.url | relative_url }}">{{ nav.title }}</a></li>
                {% endfor %}
            </ul>
        </nav>
    </div>
</header>
